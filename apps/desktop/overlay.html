<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>거북이 키우기 Warning Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      pointer-events: none;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ─── Level 1 - Caution: bold top/bottom bars ─── */
    .warning-bar-top, .warning-bar-bottom {
      position: fixed;
      left: 0;
      right: 0;
      height: 8px;
      opacity: 0;
      transition: opacity 0.2s ease, height 0.2s ease;
      z-index: 9998;
    }
    .warning-bar-top { top: 0; background: linear-gradient(180deg, #eab308 0%, transparent 100%); }
    .warning-bar-bottom { bottom: 0; background: linear-gradient(0deg, #eab308 0%, transparent 100%); }
    .warning-bar-top.active, .warning-bar-bottom.active {
      opacity: 1;
      height: 16px;
      animation: flash-bar 1s ease-in-out infinite;
    }

    /* ─── Level 2 - Warning: thick glowing border ─── */
    .warning-border {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 9997;
      pointer-events: none;
    }
    .warning-border.active {
      opacity: 1;
      box-shadow:
        inset 0 0 120px rgba(249, 115, 22, 0.5),
        inset 0 0 60px rgba(249, 115, 22, 0.3),
        inset 0 0 20px rgba(249, 115, 22, 0.2);
      animation: flash-border 0.8s ease-in-out infinite;
    }

    /* ─── Level 3 - Danger: full screen red + big warning ─── */
    .warning-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: radial-gradient(ellipse at center, rgba(239, 68, 68, 0.15) 0%, rgba(239, 68, 68, 0.4) 100%);
      opacity: 0;
      transition: opacity 0.2s ease;
      z-index: 9996;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }
    .warning-overlay.active {
      opacity: 1;
      animation: flash-overlay 0.6s ease-in-out infinite;
    }
    .warning-overlay .message-box {
      background: rgba(220, 38, 38, 0.95);
      color: white;
      padding: 28px 48px;
      border-radius: 20px;
      text-align: center;
      transform: scale(0.8);
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 0 60px rgba(239, 68, 68, 0.6), 0 20px 40px rgba(0,0,0,0.3);
    }
    .warning-overlay.active .message-box {
      transform: scale(1);
      opacity: 1;
    }
    .message-box .icon { font-size: 48px; margin-bottom: 8px; }
    .message-box .title { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; }
    .message-box .subtitle { font-size: 16px; font-weight: 400; margin-top: 8px; opacity: 0.9; }

    /* ─── Break reminder (full screen floating chaos) ─── */
    .break-reminder {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      opacity: 0;
      transition: opacity 0.5s ease;
      z-index: 9999;
      pointer-events: none;
      background: rgba(0, 0, 0, 0.3);
      overflow: hidden;
    }
    .break-reminder.active {
      opacity: 1;
      pointer-events: auto;
    }
    .break-reminder .break-floaters {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }
    .break-reminder .break-float-item {
      position: absolute;
      animation-timing-function: ease-in-out;
      animation-iteration-count: infinite;
      animation-direction: alternate;
      image-rendering: pixelated;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
      user-select: none;
      pointer-events: none;
    }
    .break-reminder .break-float-item img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      image-rendering: pixelated;
    }
    .break-reminder .break-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      z-index: 10;
      pointer-events: auto;
    }
    .break-reminder .break-center .break-icon { font-size: 64px; margin-bottom: 8px; }
    .break-reminder .break-center .break-title {
      font-size: 32px; font-weight: 900; color: white;
      text-shadow: 0 4px 20px rgba(0,0,0,0.5);
      margin-bottom: 4px;
    }
    .break-reminder .break-center .break-sub {
      font-size: 16px; color: rgba(255,255,255,0.8);
      text-shadow: 0 2px 8px rgba(0,0,0,0.4);
      margin-bottom: 24px;
    }
    .break-reminder .break-center .break-rank-name {
      font-size: 14px; font-weight: 700;
      margin-bottom: 20px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    .break-reminder .break-dismiss {
      padding: 14px 40px;
      border: 2px solid rgba(255,255,255,0.6);
      border-radius: 999px;
      background: rgba(255,255,255,0.15);
      backdrop-filter: blur(8px);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      pointer-events: auto;
    }
    .break-reminder .break-dismiss:hover {
      background: rgba(255,255,255,0.3);
      border-color: white;
      transform: scale(1.05);
    }
    @keyframes break-float-x {
      0% { transform: translateX(0) rotate(0deg); }
      100% { transform: translateX(var(--dx)) rotate(var(--rot)); }
    }
    @keyframes break-float-y {
      0% { transform: translateY(0); }
      100% { transform: translateY(var(--dy)); }
    }
    @keyframes break-bounce {
      0%, 100% { transform: translate(-50%, -50%) scale(1); }
      50% { transform: translate(-50%, -50%) scale(1.03); }
    }

    /* ─── Top-center warning message ─── */
    .warning-message {
      position: fixed;
      top: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(-20px);
      padding: 10px 28px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 700;
      text-align: center;
      opacity: 0;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 10000;
      pointer-events: none;
      white-space: nowrap;
      max-width: 80vw;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .warning-message.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .warning-message.level-1 {
      background: rgba(234, 179, 8, 0.92);
      color: #422006;
      box-shadow: 0 6px 24px rgba(234, 179, 8, 0.4);
    }
    .warning-message.level-2 {
      background: rgba(249, 115, 22, 0.92);
      color: white;
      box-shadow: 0 6px 24px rgba(249, 115, 22, 0.4);
    }
    .warning-message.level-3 {
      background: rgba(239, 68, 68, 0.95);
      color: white;
      box-shadow: 0 6px 24px rgba(239, 68, 68, 0.5);
      animation: flash-msg 0.8s ease-in-out infinite;
    }
    @keyframes flash-msg {
      0%, 100% { transform: translateX(-50%) translateY(0) scale(1); }
      50% { transform: translateX(-50%) translateY(0) scale(1.03); }
    }

    /* ─── Posture alert — bottom center of monitor ─── */
    .posture-alert {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(147, 51, 234, 0.95);
      color: white;
      padding: 16px 36px;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: -0.3px;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9999;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(147, 51, 234, 0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
      backdrop-filter: blur(12px);
      white-space: nowrap;
      max-width: 80vw;
    }
    .posture-alert.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
      animation: posture-pulse 2s ease-in-out infinite;
    }
    .posture-alert.level-2 {
      background: rgba(220, 38, 38, 0.95);
      box-shadow: 0 8px 32px rgba(220, 38, 38, 0.5), 0 0 0 1px rgba(255,255,255,0.15) inset;
      animation: posture-pulse-danger 1.2s ease-in-out infinite;
    }
    @keyframes posture-pulse {
      0%, 100% { box-shadow: 0 8px 32px rgba(147, 51, 234, 0.4), 0 0 0 1px rgba(255,255,255,0.1) inset; }
      50% { box-shadow: 0 8px 48px rgba(147, 51, 234, 0.6), 0 0 0 1px rgba(255,255,255,0.2) inset; }
    }
    @keyframes posture-pulse-danger {
      0%, 100% { box-shadow: 0 8px 32px rgba(220, 38, 38, 0.5), 0 0 0 1px rgba(255,255,255,0.15) inset; transform: translateX(-50%) translateY(0) scale(1); }
      50% { box-shadow: 0 8px 48px rgba(220, 38, 38, 0.7), 0 0 0 1px rgba(255,255,255,0.25) inset; transform: translateX(-50%) translateY(0) scale(1.02); }
    }

    /* ─── Celebration overlay ─── */
    .celebration {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.4s ease;
      z-index: 10000;
      pointer-events: none;
    }
    .celebration.active { opacity: 1; }
    .celebration.fade-out { opacity: 0; transition: opacity 0.5s ease; }

    .celebration .backdrop {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
    }

    .celebration .border-frame {
      position: absolute;
      top: 12px; left: 12px; right: 12px; bottom: 12px;
      border-radius: 16px;
      border: 3px solid rgba(255,255,255,0.5);
      animation: cel-pulse 1.2s ease-in-out infinite;
    }

    .celebration .content {
      position: relative;
      text-align: center;
      z-index: 1;
    }

    .celebration .direction {
      font-size: 18px;
      font-weight: 800;
      margin-bottom: 12px;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }

    .celebration .emoji {
      font-size: 120px;
      line-height: 1;
      margin-bottom: 16px;
      animation: cel-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .celebration .rank-name {
      font-size: 36px;
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 6px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.4);
    }

    .celebration .level-badge {
      display: inline-block;
      font-size: 14px;
      font-family: monospace;
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 12px;
    }

    .celebration .description {
      font-size: 16px;
      color: rgba(255,255,255,0.85);
      max-width: 400px;
      margin: 0 auto;
    }

    .celebration .warn-msg {
      font-size: 14px;
      font-weight: 700;
      margin-top: 12px;
    }

    /* Particles */
    .celebration .particles {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      pointer-events: none;
    }
    .celebration .particle {
      position: absolute;
      font-size: 28px;
      opacity: 0;
      animation: cel-particle 3s ease-out forwards;
    }

    @keyframes cel-pulse {
      0%, 100% { opacity: 0.4; transform: scale(1); }
      50% { opacity: 0.8; transform: scale(1.003); }
    }
    @keyframes cel-bounce {
      0% { transform: scale(0.2) rotate(-15deg); opacity: 0; }
      50% { transform: scale(1.15) rotate(5deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes cel-particle {
      0% { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-300px) scale(0.5) rotate(180deg); }
    }

    /* ─── Face-lost countdown timer ─── */
    .face-lost-timer {
      position: fixed;
      bottom: 32px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: rgba(30, 58, 138, 0.92);
      color: white;
      padding: 14px 32px;
      border-radius: 16px;
      font-size: 16px;
      font-weight: 700;
      letter-spacing: -0.3px;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      z-index: 9998;
      pointer-events: none;
      box-shadow: 0 8px 32px rgba(30, 58, 138, 0.4), 0 0 0 1px rgba(255,255,255,0.1) inset;
      backdrop-filter: blur(12px);
      white-space: nowrap;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .face-lost-timer.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .face-lost-timer .timer-icon {
      font-size: 22px;
    }
    .face-lost-timer .timer-text {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .face-lost-timer .timer-label {
      font-size: 12px;
      font-weight: 500;
      opacity: 0.75;
    }
    .face-lost-timer .timer-countdown {
      font-size: 20px;
      font-weight: 900;
      font-family: 'SF Mono', 'Menlo', monospace;
      letter-spacing: 1px;
    }
    .face-lost-timer .timer-bar {
      position: absolute;
      bottom: 0;
      left: 8%;
      right: 8%;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.2);
      overflow: hidden;
    }
    .face-lost-timer .timer-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: rgba(96, 165, 250, 0.9);
      transition: width 0.5s linear;
    }

    /* ─── Animations ─── */
    @keyframes flash-bar {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
    @keyframes flash-border {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 1; }
    }
    @keyframes flash-overlay {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }
  </style>
</head>
<body>
  <div class="warning-message" id="warningMessage"></div>
  <div class="warning-bar-top" id="barTop"></div>
  <div class="warning-bar-bottom" id="barBottom"></div>
  <div class="warning-border" id="warningBorder"></div>
  <div class="warning-overlay" id="warningOverlay">
    <div class="message-box">
      <div class="icon">⚠️</div>
      <div class="title">너무 가까워요!</div>
      <div class="subtitle">모니터에서 떨어져 주세요</div>
    </div>
  </div>
  <div class="break-reminder" id="breakReminder">
    <div class="break-floaters" id="breakFloaters"></div>
    <div class="break-center" style="animation: break-bounce 2s ease-in-out infinite">
      <div class="break-icon">☕</div>
      <div class="break-title">휴식 시간이에요!</div>
      <div class="break-sub">잠시 눈을 쉬어주세요</div>
      <div class="break-rank-name" id="breakRankName"></div>
      <button class="break-dismiss" id="breakDismissBtn" onclick="dismissBreak()">휴식 종료</button>
    </div>
  </div>
  <div class="face-lost-timer" id="faceLostTimer">
    <span class="timer-icon">👀</span>
    <div class="timer-text">
      <span class="timer-label">얼굴이 감지되지 않습니다</span>
      <span class="timer-countdown" id="faceLostCountdown">0:00</span>
    </div>
    <div class="timer-bar">
      <div class="timer-bar-fill" id="faceLostBarFill" style="width: 0%"></div>
    </div>
  </div>
  <div class="posture-alert" id="postureAlert">
    🧘 자세를 바르게 해주세요
  </div>
  <div class="celebration" id="celebration">
    <div class="backdrop" id="celBackdrop"></div>
    <div class="border-frame" id="celBorder"></div>
    <div class="particles" id="celParticles"></div>
    <div class="content">
      <div class="direction" id="celDirection"></div>
      <div class="emoji" id="celEmoji"></div>
      <div class="rank-name" id="celName"></div>
      <div class="level-badge" id="celBadge"></div>
      <div class="description" id="celDesc"></div>
      <div class="warn-msg" id="celWarn"></div>
    </div>
  </div>

  <script>
    const barTop = document.getElementById('barTop');
    const barBottom = document.getElementById('barBottom');
    const border = document.getElementById('warningBorder');
    const overlay = document.getElementById('warningOverlay');
    const breakEl = document.getElementById('breakReminder');
    const postureEl = document.getElementById('postureAlert');
    const warningMsgEl = document.getElementById('warningMessage');
    const faceLostEl = document.getElementById('faceLostTimer');
    const faceLostCountdownEl = document.getElementById('faceLostCountdown');
    const faceLostBarFillEl = document.getElementById('faceLostBarFill');

    let breakTimeout = null;
    let postureTimeout = null;
    let faceLostTotalSec = 0; // total duration for progress bar

    // Warning messages per level (set from main process)
    let warningMessages = ['', '', ''];

    // ─── Audio: generate warning beep using Web Audio API ───
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playBeep(freq, duration, volume) {
      const osc = audioCtx.createOscillator();
      const gain = audioCtx.createGain();
      osc.connect(gain);
      gain.connect(audioCtx.destination);
      osc.frequency.value = freq;
      osc.type = 'sine';
      gain.gain.value = volume;
      // Fade out
      gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
      osc.start(audioCtx.currentTime);
      osc.stop(audioCtx.currentTime + duration);
    }

    let lastSoundTime = 0;
    let lastSoundLevel = 0;

    function playWarningSound(level) {
      const now = Date.now();
      // Throttle: level 1 = every 5s, level 2 = every 3s, level 3 = every 1.5s
      const intervals = { 1: 5000, 2: 3000, 3: 1500 };
      const minInterval = intervals[level] || 3000;

      if (now - lastSoundTime < minInterval && lastSoundLevel === level) return;
      lastSoundTime = now;
      lastSoundLevel = level;

      if (level === 1) {
        // Soft single beep
        playBeep(800, 0.15, 0.15);
      } else if (level === 2) {
        // Double beep
        playBeep(1000, 0.12, 0.25);
        setTimeout(() => playBeep(1000, 0.12, 0.25), 180);
      } else if (level === 3) {
        // Urgent triple beep
        playBeep(1200, 0.1, 0.4);
        setTimeout(() => playBeep(1400, 0.1, 0.4), 150);
        setTimeout(() => playBeep(1600, 0.15, 0.4), 300);
      }
    }

    // ─── Warning messages (set from main process) ───
    window.setWarningMessages = function(messages) {
      if (Array.isArray(messages)) warningMessages = messages;
    };

    // ─── Warning level control ───
    window.setWarningLevel = function(level) {
      console.log('[Overlay] setWarningLevel:', level);

      // Reset all
      barTop.classList.remove('active');
      barBottom.classList.remove('active');
      border.classList.remove('active');
      overlay.classList.remove('active');
      warningMsgEl.classList.remove('active', 'level-1', 'level-2', 'level-3');

      if (level >= 1) {
        barTop.classList.add('active');
        barBottom.classList.add('active');
      }
      if (level >= 2) {
        border.classList.add('active');
      }
      if (level >= 3) {
        overlay.classList.add('active');
      }

      // Show warning message at top center
      if (level > 0) {
        const msg = warningMessages[level - 1];
        if (msg) {
          warningMsgEl.textContent = msg;
          warningMsgEl.classList.add('active', 'level-' + level);
        }
        playWarningSound(level);
      }
    };

    window.showBreakReminder = function(rankData, chaosLevel) {
      // Dismiss any active celebration first
      celEl.classList.remove('active', 'fade-out');
      celParticles.innerHTML = '';
      if (celTimeout) { clearTimeout(celTimeout); celTimeout = null; }
      if (celFadeTimeout) { clearTimeout(celFadeTimeout); celFadeTimeout = null; }

      // rankData: { emoji, image?, name, color }
      // chaosLevel: 1-10 (default 3)
      const emoji = (rankData && rankData.emoji) || '🐢';
      const color = (rankData && rankData.color) || '#22c55e';
      const image = rankData && rankData.image;
      const name = (rankData && rankData.name) || '';
      const chaos = Math.max(1, Math.min(10, chaosLevel || 3));

      // Set rank name in center
      const rankNameEl = document.getElementById('breakRankName');
      rankNameEl.textContent = name ? '— ' + emoji + ' ' + name + ' —' : '';
      rankNameEl.style.color = color;

      // Sound — louder at higher chaos, more beeps at high chaos
      const vol = 0.1 + (chaos / 10) * 0.3;
      playBeep(600, 0.3, vol);
      setTimeout(() => playBeep(800, 0.3, vol), 400);
      if (chaos >= 7) setTimeout(() => playBeep(1000, 0.2, vol), 700);
      if (chaos >= 9) setTimeout(() => playBeep(1200, 0.15, vol), 900);

      // Spawn floating items — exponential scaling for dramatic difference
      const floaters = document.getElementById('breakFloaters');
      floaters.innerHTML = '';

      const emojis = [emoji, '☕', '😴', '🧘', '💆', '🌿', '✨'];
      // Exponential item count: 3→8→15→24→35→48→65→85→110→140
      const count = Math.round(3 * Math.pow(1.5, chaos - 1));
      const minSize = Math.max(16, 50 - chaos * 4);   // 46→10 — more variety at high chaos
      const maxSize = 50 + chaos * 25;                 // 75→300px — massive at high chaos
      const imgChance = image ? (0.3 + chaos * 0.05) : 0; // 35%→80% image usage at high chaos

      // Dynamic background darkness: subtle at low, nearly opaque at high
      const bgOpacity = (0.1 + Math.pow(chaos / 10, 1.5) * 0.55).toFixed(2); // 0.12→0.65
      breakEl.style.background = 'rgba(0, 0, 0, ' + bgOpacity + ')';

      for (let i = 0; i < count; i++) {
        const el = document.createElement('div');
        el.className = 'break-float-item';

        // Alternate between rank image and emojis
        const useImage = Math.random() < imgChance;
        if (useImage) {
          const img = document.createElement('img');
          img.src = image;
          img.draggable = false;
          el.appendChild(img);
        } else {
          el.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        }

        // Random size — at high chaos some items are HUGE
        const isGiant = chaos >= 6 && Math.random() < (chaos - 5) * 0.08;
        const size = isGiant
          ? (maxSize + Math.floor(Math.random() * 150))
          : (minSize + Math.floor(Math.random() * (maxSize - minSize)));
        el.style.width = size + 'px';
        el.style.height = size + 'px';
        el.style.fontSize = size + 'px';
        el.style.lineHeight = size + 'px';

        // Random position
        el.style.left = (-10 + Math.random() * 100) + '%';
        el.style.top = (-10 + Math.random() * 100) + '%';

        // Movement magnitude scales exponentially
        const moveMag = 30 + chaos * chaos * 2; // 32→230
        const dx = (-moveMag + Math.random() * moveMag * 2);
        const dy = (-moveMag * 0.8 + Math.random() * moveMag * 1.6);
        const rotRange = 10 + chaos * chaos; // 11→110 degrees
        const rot = (-rotRange + Math.random() * rotRange * 2);
        // Speed: slow at low chaos, frantic at high
        const dur = Math.max(0.6, (6 - chaos * 0.5) + Math.random() * 2); // 5.5s→1.1s
        const delay = Math.random() * Math.max(0.3, 3 - chaos * 0.25);

        el.style.setProperty('--dx', dx + 'px');
        el.style.setProperty('--dy', dy + 'px');
        el.style.setProperty('--rot', rot + 'deg');
        el.style.animation = 'break-float-x ' + dur + 's ease-in-out ' + delay + 's infinite alternate, break-float-y ' + (dur * 0.7) + 's ease-in-out ' + (delay + 0.3) + 's infinite alternate';
        el.style.opacity = (0.5 + Math.random() * 0.5).toFixed(2);

        floaters.appendChild(el);
      }

      breakEl.classList.add('active');
      if (breakTimeout) clearTimeout(breakTimeout);
    };

    function dismissBreak() {
      breakEl.classList.remove('active');
      document.getElementById('breakFloaters').innerHTML = '';
      if (breakTimeout) clearTimeout(breakTimeout);
      // Notify main process to re-enable click-through
      if (window.__breakDismissCallback) window.__breakDismissCallback();
    }

    window.dismissBreak = dismissBreak;

    window.showPostureAlert = function(message, level) {
      var msg = message || '자세를 바르게 해주세요';
      var lvl = level || 1;
      postureEl.textContent = '🧘 ' + msg;
      postureEl.classList.remove('level-2');
      if (lvl >= 2) postureEl.classList.add('level-2');
      playBeep(lvl >= 2 ? 800 : 700, 0.2, 0.15);
      postureEl.classList.add('active');
      if (postureTimeout) clearTimeout(postureTimeout);
      // Keep visible longer — posture issues persist, auto-hide after 8s
      postureTimeout = setTimeout(() => {
        postureEl.classList.remove('active', 'level-2');
      }, 8000);
    };

    // ─── Face-lost countdown timer ───
    window.showFaceLostTimer = function(remainingSec, elapsedSec) {
      if (remainingSec <= 0) {
        faceLostEl.classList.remove('active');
        faceLostTotalSec = 0;
        return;
      }

      // Track total duration for progress bar
      var totalSec = elapsedSec + remainingSec;
      if (faceLostTotalSec === 0 || Math.abs(totalSec - faceLostTotalSec) > 2) {
        faceLostTotalSec = totalSec;
      }

      // Format countdown: m:ss
      var min = Math.floor(remainingSec / 60);
      var sec = Math.floor(remainingSec % 60);
      faceLostCountdownEl.textContent = min + ':' + String(sec).padStart(2, '0');

      // Progress bar: fills as time passes (elapsed / total)
      var pct = faceLostTotalSec > 0 ? Math.min(100, (elapsedSec / faceLostTotalSec) * 100) : 0;
      faceLostBarFillEl.style.width = pct + '%';

      faceLostEl.classList.add('active');
    };

    // ─── Celebration effect ───
    const celEl = document.getElementById('celebration');
    const celBackdrop = document.getElementById('celBackdrop');
    const celBorder = document.getElementById('celBorder');
    const celParticles = document.getElementById('celParticles');
    let celTimeout = null;
    let celFadeTimeout = null;

    window.showCelebration = function(data) {
      // Dismiss any active break first to avoid flicker
      breakEl.classList.remove('active');
      document.getElementById('breakFloaters').innerHTML = '';
      breakEl.style.background = '';

      // data: { direction, emoji, image?, name, level, description, color }
      const isUp = data.direction === 'up';
      const color = data.color || '#22c55e';

      // Populate content
      document.getElementById('celDirection').textContent = isUp ? '⬆️ 칭호 상승!' : '⬇️ 칭호 하락';
      document.getElementById('celDirection').style.color = color;

      const emojiEl = document.getElementById('celEmoji');
      if (data.image) {
        emojiEl.innerHTML = '<img src="' + data.image + '" style="width:160px;height:160px;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 0 30px ' + color + '80)" draggable="false" />';
      } else {
        emojiEl.innerHTML = '';
        emojiEl.textContent = data.emoji || '🐢';
        emojiEl.style.filter = 'drop-shadow(0 0 30px ' + color + '80)';
      }
      document.getElementById('celName').textContent = data.name || '';
      document.getElementById('celName').style.color = color;

      const badge = document.getElementById('celBadge');
      var lvl = data.level || 0;
      badge.textContent = data.step_label || data.name || '';
      badge.style.backgroundColor = color + '30';
      badge.style.color = color;
      badge.style.border = '1px solid ' + color + '50';

      document.getElementById('celDesc').textContent = data.description || '';

      const warn = document.getElementById('celWarn');
      if (isUp && data.level >= 5) {
        warn.textContent = '자세 교정이 필요합니다!';
        warn.style.color = color;
        warn.style.display = 'block';
      } else {
        warn.style.display = 'none';
      }

      // Backdrop
      celBackdrop.style.background = 'radial-gradient(circle at center, ' + color + '25 0%, ' + color + '08 50%, transparent 70%)';
      celBorder.style.borderColor = color + '60';

      // Spawn particles — mix emoji into sparkle particles
      celParticles.innerHTML = '';
      const sparkles = ['✨', '🎉', '⭐', '🌟', '💫'];
      const emoji = data.emoji || '🐢';
      const particlePool = [...sparkles, emoji, emoji, emoji];
      for (let i = 0; i < 20; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.textContent = particlePool[Math.floor(Math.random() * particlePool.length)];
        p.style.left = (Math.random() * 100) + '%';
        p.style.top = (60 + Math.random() * 40) + '%';
        p.style.animationDelay = (Math.random() * 1.5) + 's';
        p.style.animationDuration = (2 + Math.random() * 2) + 's';
        p.style.fontSize = (20 + Math.random() * 24) + 'px';
        celParticles.appendChild(p);
      }

      // Re-trigger bounce animation
      const bounceEl = document.getElementById('celEmoji');
      bounceEl.style.animation = 'none';
      bounceEl.offsetHeight; // reflow
      bounceEl.style.animation = 'cel-bounce 0.7s cubic-bezier(0.34, 1.56, 0.64, 1)';

      // Show
      celEl.classList.remove('fade-out');
      celEl.classList.add('active');

      // Play celebratory sound
      playBeep(523, 0.15, 0.2);
      setTimeout(() => playBeep(659, 0.15, 0.2), 150);
      setTimeout(() => playBeep(784, 0.15, 0.2), 300);
      setTimeout(() => playBeep(1047, 0.25, 0.25), 450);

      // Fade out at 4.5s, hide at 5.2s
      if (celTimeout) clearTimeout(celTimeout);
      if (celFadeTimeout) clearTimeout(celFadeTimeout);
      celFadeTimeout = setTimeout(() => {
        celEl.classList.add('fade-out');
      }, 4500);
      celTimeout = setTimeout(() => {
        celEl.classList.remove('active', 'fade-out');
        celParticles.innerHTML = '';
      }, 5200);
    };

    // Initialize hidden
    window.setWarningLevel(0);
  </script>
</body>
</html>
