appId: com.faceguard.app
productName: Dont Be A Turtle
copyright: Copyright © 2024 Dont Be A Turtle

directories:
  output: ../../release

files:
  - dist-electron/**/*
  - overlay.html
  - ui/**/*

extraResources:
  - from: ../../apps/backend/dist/faceguard-backend/
    to: backend
    filter:
      - "**/*"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: ../../resources/icon.ico

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  deleteAppDataOnUninstall: false
  shortcutName: Dont Be A Turtle

mac:
  target:
    - target: dmg
      arch:
        - x64
        - arm64
  icon: ../../resources/icon.icns
  category: public.app-category.utilities
  hardenedRuntime: true
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  extendInfo:
    NSCameraUsageDescription: "얼굴 거리를 측정하여 거북목을 방지하기 위해 카메라를 사용합니다."

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - AppImage
  icon: ../../resources/icon.png
  category: Utility
